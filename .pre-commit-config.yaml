repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.98.0
    hooks:
      - id: terraform_fmt
        files: (^|.*/)aws-terra-3/(dev|staging|production|global|modules)/.*\.tf$|^(dev|staging|production|global|modules)/.*\.tf$
      - id: terraform_validate
        files: (^|.*/)aws-terra-3/(dev|staging|production|global|modules)/.*\.tf$|^(dev|staging|production|global|modules)/.*\.tf$
      - id: terraform_tflint
        files: (^|.*/)aws-terra-3/(dev|staging|production|global|modules)/.*\.tf$|^(dev|staging|production|global|modules)/.*\.tf$

  - repo: local
    hooks:
      - id: checkov-system
        name: checkov (system)
        entry: /home/ivanr/.venv/bin/checkov
        language: system
        files: (^|.*/)aws-terra-3/(dev|staging|production|global|modules)/.*\.tf$|^(dev|staging|production|global|modules)/.*\.tf$
        args:
          - --quiet
          - --framework
          - terraform
          - --skip-check
          - CKV_AWS_260,CKV_AWS_382,CKV_AWS_23,CKV_AWS_79,CKV_AWS_88,CKV_AWS_8,CKV_AWS_126,CKV_AWS_135,CKV2_AWS_41,CKV_AWS_130,CKV2_AWS_11,CKV2_AWS_12,CKV_AWS_158,CKV_AWS_18,CKV_AWS_144,CKV2_AWS_61,CKV2_AWS_62,CKV_AWS_145,CKV_AWS_226,CKV_AWS_353,CKV_AWS_157,CKV_AWS_293,CKV_AWS_118,CKV_AWS_161,CKV_AWS_129,CKV2_AWS_60
          - -f
