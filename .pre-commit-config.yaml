repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.98.0
    hooks:
      - id: terraform_fmt
        files: ^(dev|staging|production|global|modules)/.*\.tf$
      - id: terraform_validate
        files: ^(dev|staging|production|global|modules)/.*\.tf$
      - id: terraform_tflint
        files: ^(dev|staging|production|global|modules)/.*\.tf$

  - repo: local
    hooks:
      - id: checkov-system
        name: checkov (system)
        entry: checkov
        language: system
        files: ^(dev|staging|production|global|modules)/.*\.tf$
        args:
          - --config-file
          - .checkov.yml
          - -f
